<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>pretext-pdfjs Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,300..600;1,7..72,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f1eb;
  --surface: #ffffff;
  --border: #ddd7cc;
  --ink: #252320;
  --dim: #8a857a;
  --accent: #b5432a;
  --accent-soft: #b5432a12;
  --green: #3a7d5c;
  --radius: 4px;
  --shadow: 0 1px 3px #00000008, 0 4px 16px #00000006;
  --serif: 'Literata', Georgia, serif;
  --mono: 'IBM Plex Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  font-family: var(--mono);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Top bar ── */
.topbar {
  height: 48px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.topbar-logo {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  white-space: nowrap;
}

.topbar-filename {
  font-size: 11px;
  color: var(--dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  min-width: 0;
}

@media (max-width: 640px) {
  .topbar-filename { display: none; }
}

/* ── Buttons ── */
.btn {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 400;
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--ink); }
.btn.active { background: var(--ink); color: var(--surface); border-color: var(--ink); }

/* ── Toolbar ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.toolbar-group {
  display: flex;
  align-items: center;
  gap: 4px;
}

.toolbar-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 4px;
}

.page-input {
  font-family: var(--mono);
  font-size: 11px;
  width: 40px;
  text-align: center;
  padding: 4px 2px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--ink);
}
.page-input:focus { outline: none; border-color: var(--accent); }

.page-total {
  font-size: 11px;
  color: var(--dim);
}

/* ── Mode toggle (segmented control) ── */
.mode-toggle {
  display: flex;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.mode-toggle .btn {
  border: none;
  border-radius: 0;
  border-right: 1px solid var(--border);
  font-size: 10px;
  padding: 5px 10px;
}
.mode-toggle .btn:last-child { border-right: none; }
.mode-toggle .btn.active { background: var(--ink); color: var(--surface); }

.mode-label {
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 0 4px;
}

/* ── Viewer ── */
.viewer {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}

.viewer canvas {
  display: block;
}

.viewer-scroll {
  width: 100%;
  height: 100%;
  overflow: auto;
  display: flex;
  justify-content: center;
}

.viewer-scroll::-webkit-scrollbar { width: 6px; }
.viewer-scroll::-webkit-scrollbar-track { background: transparent; }
.viewer-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Upload overlay ── */
.upload-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: var(--bg);
  z-index: 10;
}

.upload-overlay.hidden { display: none; }

.upload-box {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 48px 64px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.upload-box:hover { border-color: var(--accent); background: var(--accent-soft); }
.upload-box.dragover { border-color: var(--accent); background: var(--accent-soft); }

.upload-icon {
  font-size: 32px;
  margin-bottom: 12px;
}

.upload-text {
  font-size: 13px;
  color: var(--dim);
  line-height: 1.6;
}

.upload-or {
  font-size: 11px;
  color: var(--dim);
}

.btn-sample {
  font-family: var(--mono);
  font-size: 11px;
  padding: 8px 20px;
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-sample:hover { background: var(--accent); color: var(--surface); }

/* ── Status bar ── */
.statusbar {
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  font-size: 10px;
  color: var(--dim);
}

.statusbar a {
  color: var(--accent);
  text-decoration: none;
}
.statusbar a:hover { text-decoration: underline; }
</style>
<script type="importmap">
{
  "imports": {
    "@chenglou/pretext": "https://esm.sh/@chenglou/pretext@0.0.3",
    "pdfjs-dist": "https://esm.sh/pdfjs-dist@4.9.155/build/pdf.min.mjs"
  }
}
</script>
</head>
<body>

<div id="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-logo">pretext-pdfjs</div>
    <div class="topbar-filename" id="filename">No file loaded</div>
    <button class="btn" id="btnOpen">Open</button>
    <input type="file" accept=".pdf" id="fileInput" style="display:none">
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-group">
      <button class="btn" id="btnPrev" title="Previous page">&larr;</button>
      <input class="page-input" id="pageInput" type="text" value="1">
      <span class="page-total" id="pageTotal">/ 0</span>
      <button class="btn" id="btnNext" title="Next page">&rarr;</button>
    </div>

    <div class="toolbar-sep"></div>

    <div class="toolbar-group">
      <button class="btn" id="btnZoomOut">&minus;</button>
      <span class="page-total" id="zoomLabel">16px</span>
      <button class="btn" id="btnZoomIn">+</button>
    </div>

    <div class="toolbar-sep"></div>

    <div class="mode-toggle" id="modeToggle">
      <button class="btn active" data-mode="document">Document</button>
      <button class="btn" data-mode="reflow">Reflow</button>
      <button class="btn" data-mode="reflow-morph">Reflow+Morph</button>
      <button class="btn" data-mode="reader">Reader</button>
      <button class="btn" data-mode="reader-morph">Reader+Morph</button>
    </div>

    <span class="mode-label" id="modeHint"></span>
  </div>

  <!-- Viewer -->
  <div class="viewer" id="viewer">
    <div class="upload-overlay" id="uploadOverlay">
      <div class="upload-box" id="uploadBox">
        <div class="upload-icon">&#x1F4C4;</div>
        <div class="upload-text">Drop a PDF here or click to open</div>
      </div>
      <div class="upload-or">or</div>
      <button class="btn-sample" id="btnSample">Load sample PDF</button>
    </div>
    <div class="viewer-scroll" id="viewerScroll"></div>
  </div>

  <!-- Status bar -->
  <div class="statusbar">
    <span id="statusText">Ready</span>
    <span>Built with <a href="https://www.npmjs.com/package/pretext-pdfjs" target="_blank">pretext-pdfjs</a></span>
  </div>
</div>

<script type="module">
import { createReflowRenderer } from "./src/reflow.js";
import { createPDFPinchReader } from "./src/pinch.js";

const WORKER_SRC = "https://esm.sh/pdfjs-dist@4.9.155/build/pdf.worker.min.mjs";
const SAMPLE_URL = "https://mozilla.github.io/pdf.js/web/compressed.tracemonkey-pldi-09.pdf";

// ── State ──
let pdfjs = null;
let pdfDoc = null;
let currentMode = "document";
let currentPage = 1;
let numPages = 0;
let zoom = 1.5;
let fontSize = 16;
let activeRenderer = null; // reflow or reader instance
let docCanvas = null;

// ── DOM refs ──
const viewer = document.getElementById("viewer");
const viewerScroll = document.getElementById("viewerScroll");
const uploadOverlay = document.getElementById("uploadOverlay");
const uploadBox = document.getElementById("uploadBox");
const fileInput = document.getElementById("fileInput");
const filenameEl = document.getElementById("filename");
const pageInput = document.getElementById("pageInput");
const pageTotalEl = document.getElementById("pageTotal");
const zoomLabel = document.getElementById("zoomLabel");
const statusText = document.getElementById("statusText");
const modeHint = document.getElementById("modeHint");

// ── PDF.js init ──
async function ensurePdfjs() {
  if (pdfjs) return;
  pdfjs = await import("pdfjs-dist");
  pdfjs.GlobalWorkerOptions.workerSrc = WORKER_SRC;
}

// ── Load PDF ──
async function loadPDF(source, name) {
  await ensurePdfjs();
  statusText.textContent = "Loading...";

  const loadParams = typeof source === "string"
    ? { url: source }
    : { data: source };
  pdfDoc = await pdfjs.getDocument(loadParams).promise;
  numPages = pdfDoc.numPages;
  currentPage = 1;

  filenameEl.textContent = name || "document.pdf";
  pageTotalEl.textContent = `/ ${numPages}`;
  pageInput.value = "1";
  uploadOverlay.classList.add("hidden");

  await switchMode(currentMode);
  statusText.textContent = `${numPages} page${numPages > 1 ? "s" : ""} loaded`;
}

// ── Document mode: standard pdfjs render ──
async function renderDocumentPage(pageNum) {
  if (!pdfDoc) return;
  const page = await pdfDoc.getPage(pageNum);
  const viewport = page.getViewport({ scale: zoom });
  const dpr = Math.min(devicePixelRatio || 1, 3);

  viewerScroll.innerHTML = "";
  const canvas = document.createElement("canvas");
  canvas.width = viewport.width * dpr;
  canvas.height = viewport.height * dpr;
  canvas.style.width = viewport.width + "px";
  canvas.style.height = viewport.height + "px";
  canvas.style.margin = "auto";
  canvas.style.display = "block";
  canvas.style.boxShadow = "var(--shadow)";

  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  await page.render({ canvasContext: ctx, viewport }).promise;

  viewerScroll.appendChild(canvas);
  docCanvas = canvas;
}

// ── Destroy current renderer ──
function destroyRenderer() {
  if (activeRenderer) {
    activeRenderer.destroy();
    activeRenderer = null;
  }
  viewerScroll.innerHTML = "";
  docCanvas = null;
}

// ── Switch mode ──
async function switchMode(mode) {
  destroyRenderer();
  currentMode = mode;

  // Update toggle buttons
  document.querySelectorAll("#modeToggle .btn").forEach(b => {
    b.classList.toggle("active", b.dataset.mode === mode);
  });

  if (!pdfDoc) return;

  if (mode === "document") {
    modeHint.textContent = "";
    updateZoomLabel();
    await renderDocumentPage(currentPage);
  } else if (mode === "reflow" || mode === "reflow-morph") {
    const isMorph = mode === "reflow-morph";
    modeHint.textContent = isMorph ? "fisheye + images" : "images preserved";

    // Create a container div for the reflow canvas
    const container = document.createElement("div");
    container.style.width = "100%";
    container.style.height = "100%";
    viewerScroll.appendChild(container);

    activeRenderer = createReflowRenderer(container, {
      fontSize,
      fontFamily: '"Literata", Georgia, serif',
      lineHeight: 1.6,
      padding: 24,
      background: "#f4f1eb",
      textColor: "#353230",
      enablePinchZoom: true,
      enableMorph: isMorph,
      enableMomentumScroll: true,
      workerSrc: WORKER_SRC,
      onZoom: (fs) => { fontSize = fs; updateZoomLabel(); },
    });

    // Open using the same pdfDoc's underlying data
    // Re-open to let reflow manage its own pdfjs instance
    const url = pdfDoc._transport?._params?.url;
    const data = pdfDoc._transport?._params?.data;
    if (url) {
      await activeRenderer.open(url);
    } else if (data) {
      await activeRenderer.open(data);
    }
    await activeRenderer.showPage(currentPage);
    updateZoomLabel();
  } else if (mode === "reader" || mode === "reader-morph") {
    const isTextOnly = true;
    const isMorph = mode === "reader-morph";
    const pinchMode = isMorph ? "scrollMorph" : "pinchType";
    modeHint.textContent = "text only" + (isMorph ? " + fisheye" : "");

    const container = document.createElement("div");
    container.style.width = "100%";
    container.style.height = "100%";
    viewerScroll.appendChild(container);

    activeRenderer = createPDFPinchReader(container, {
      mode: pinchMode,
      fontSize,
      centerFontSize: 26,
      edgeFontSize: 11,
      fontFamily: '"Literata", Georgia, serif',
      lineHeight: 1.6,
      padding: 24,
      background: "#0a0a0a",
      textColor: "#dcd5c8",
      workerSrc: WORKER_SRC,
      onZoom: (fs) => { if (typeof fs === "number") { fontSize = fs; updateZoomLabel(); } },
    });

    const url = pdfDoc._transport?._params?.url;
    const data = pdfDoc._transport?._params?.data;
    if (url) {
      await activeRenderer.open(url);
    } else if (data) {
      await activeRenderer.open(data);
    }
    await activeRenderer.showPage(currentPage);
    updateZoomLabel();
  }
}

// ── Zoom / font size ──
function updateZoomLabel() {
  if (currentMode === "document") {
    zoomLabel.textContent = Math.round(zoom * 100) + "%";
  } else {
    zoomLabel.textContent = fontSize + "px";
  }
}

function zoomIn() {
  if (currentMode === "document") {
    zoom = Math.min(zoom + 0.25, 5);
    updateZoomLabel();
    renderDocumentPage(currentPage);
  } else if (activeRenderer?.setFontSize) {
    fontSize = Math.min(fontSize + 1, 48);
    activeRenderer.setFontSize(fontSize);
    updateZoomLabel();
  } else {
    fontSize = Math.min(fontSize + 1, 60);
    updateZoomLabel();
  }
}

function zoomOut() {
  if (currentMode === "document") {
    zoom = Math.max(zoom - 0.25, 0.5);
    updateZoomLabel();
    renderDocumentPage(currentPage);
  } else if (activeRenderer?.setFontSize) {
    fontSize = Math.max(fontSize - 1, 8);
    activeRenderer.setFontSize(fontSize);
    updateZoomLabel();
  } else {
    fontSize = Math.max(fontSize - 1, 8);
    updateZoomLabel();
  }
}

// ── Page navigation ──
async function goToPage(num) {
  if (!pdfDoc || num < 1 || num > numPages) return;
  currentPage = num;
  pageInput.value = num;

  if (currentMode === "document") {
    await renderDocumentPage(num);
  } else if (activeRenderer) {
    await activeRenderer.showPage(num);
  }
}

// ── Event handlers ──

// Mode toggle
document.getElementById("modeToggle").addEventListener("click", (e) => {
  const btn = e.target.closest("[data-mode]");
  if (!btn || btn.dataset.mode === currentMode) return;
  switchMode(btn.dataset.mode);
});

// Page nav
document.getElementById("btnPrev").addEventListener("click", () => {
  if (currentPage > 1) goToPage(currentPage - 1);
});
document.getElementById("btnNext").addEventListener("click", () => {
  if (currentPage < numPages) goToPage(currentPage + 1);
});
pageInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const val = parseInt(pageInput.value, 10);
    if (val >= 1 && val <= numPages) goToPage(val);
    else pageInput.value = currentPage;
  }
});

// Keyboard nav
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === "ArrowLeft") { if (currentPage > 1) goToPage(currentPage - 1); }
  else if (e.key === "ArrowRight") { if (currentPage < numPages) goToPage(currentPage + 1); }
});

// Zoom buttons
document.getElementById("btnZoomIn").addEventListener("click", zoomIn);
document.getElementById("btnZoomOut").addEventListener("click", zoomOut);

// File open
document.getElementById("btnOpen").addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const data = new Uint8Array(await file.arrayBuffer());
  await loadPDF(data, file.name);
});

// Upload overlay
uploadBox.addEventListener("click", () => fileInput.click());
uploadBox.addEventListener("dragover", (e) => { e.preventDefault(); uploadBox.classList.add("dragover"); });
uploadBox.addEventListener("dragleave", () => uploadBox.classList.remove("dragover"));
uploadBox.addEventListener("drop", async (e) => {
  e.preventDefault();
  uploadBox.classList.remove("dragover");
  const file = e.dataTransfer.files[0];
  if (file?.type === "application/pdf") {
    const data = new Uint8Array(await file.arrayBuffer());
    await loadPDF(data, file.name);
  }
});

// Sample PDF
document.getElementById("btnSample").addEventListener("click", async () => {
  await loadPDF(SAMPLE_URL, "tracemonkey-pldi-09.pdf");
});

// Initial zoom label
updateZoomLabel();
</script>

</body>
</html>
